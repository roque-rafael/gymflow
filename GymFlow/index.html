<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow V7</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="icon-192.png">
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #3b82f6; --s: #ccff00; --d: #ef4444; --g: #fbbf24; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); padding: 20px; margin: 0; overflow-x: hidden; }
        .container { max-width: 900px; margin: auto; padding-bottom: 100px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--c); padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--p); min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        .bar-bg { width: 80%; background: #334155; height: 6px; border-radius: 10px; margin: 10px auto 0 auto; overflow: hidden; }
        .bar-fill { background: var(--s); height: 100%; transition: width 0.5s; width: 0%; }
        .sel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-t { background: var(--c); color: white; border: 2px solid #334155; padding: 15px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-t.active { border-color: var(--p); background: #2563eb33; color: var(--p); }
        .act { display: none; justify-content: center; margin-bottom: 20px; }
        .btn-e { background: #334155; color: white; padding: 10px 20px; border-radius: 8px; border: 1px dashed var(--p); font-size: 0.8rem; cursor: pointer; }
        .track { display: flex; transition: transform 0.4s; gap: 15px; padding: 10px 0; }
        .card { min-width: 280px; background: var(--c); border-radius: 20px; overflow: hidden; border: 3px solid transparent; }
        .card.done { border-color: var(--s); }
        .card img { width: 100%; height: 140px; object-fit: cover; opacity: 0.4; }
        .card.done img { opacity: 1; }
        .sets { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; }
        .bub { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #475569; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .bub.checked { background: var(--s); color: #000; border-color: var(--s); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .m-content { background: var(--c); width: 90%; max-width: 450px; padding: 20px; border-radius: 15px; border: 1px solid var(--p); }
        .peso-container { background: var(--c); padding: 20px; border-radius: 20px; margin-top: 30px; }
        input[type="number"] { background: #0f172a; color: white; border: none; padding: 12px; border-radius: 8px; width: 60%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;"><h1 style="color: var(--p);">GymFlow <small style="font-size: 12px; opacity: 0.5;">V7</small></h1></header>
        <div class="stats-grid">
            <div class="stat-card">
                <small>Meta do Desafio</small>
                <h2 id="cont" style="margin:5px 0; color:var(--p);">0</h2>
                <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
            </div>
            <div class="stat-card">
                <small>Data Limite</small>
                <input type="date" id="dateInp" onchange="upDate()" style="background:#0f172a; color:white; border:none; padding:5px; border-radius:5px; width:90%; margin-top:5px;">
                <div id="txtC" style="color:var(--g); font-size:0.75rem; margin-top:5px; font-weight:bold;"></div>
            </div>
        </div>
        <div class="sel">
            <button class="btn-t" onclick="selT('A')">TREINO A</button>
            <button class="btn-t" onclick="selT('B')">TREINO B</button>
            <button class="btn-t" onclick="selT('C')">TREINO C</button>
        </div>
        <div class="act" id="acts"><button class="btn-e" onclick="openM()">⚙️ Editar Treino <span id="lAtivo"></span></button></div>
        <div id="cView" style="display:none">
            <div style="overflow:hidden"><div class="track" id="track"></div></div>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:10px;">
                <button onclick="move(-1)" style="background:var(--c); color:white; width:45px; height:45px; border-radius:50%; border:1px solid #334155;">❮</button>
                <button onclick="move(1)" style="background:var(--c); color:white; width:45px; height:45px; border-radius:50%; border:1px solid #334155;">❯</button>
            </div>
        </div>

        <div class="peso-container">
            <h3>Evolução de Peso</h3>
            <div style="display:flex; gap:10px; align-items: center;">
                <input type="number" id="pesoInp" placeholder="kg">
                <button onclick="addP()" style="background: var(--p); color: white; padding: 12px; border-radius: 8px; border:none; flex:1; font-weight:bold;">SALVAR</button>
            </div>
            <canvas id="chart" height="150" style="margin-top:15px;"></canvas>
        </div>

        <button onclick="reset()" style="background:transparent; color:var(--d); border:1px solid var(--d); width:100%; padding:12px; border-radius:10px; margin-top:40px; font-weight:bold; cursor:pointer;">⚠️ RESETAR TUDO</button>
    </div>

    <div class="modal" id="modal"><div class="m-content">
        <h3 style="margin-top:0">Editar <span id="mNome"></span></h3>
        <div id="lEdicao"></div>
        <div style="background:#0f172a; padding:15px; border-radius:10px; margin-top:15px;">
            <input type="text" id="nN" placeholder="Nome" style="width:100%; margin-bottom:10px; background:#334155; color:white; padding:10px; border-radius:8px; border:none;">
            <input type="number" id="nP" placeholder="kg" style="width:45%; background:#334155; color:white; padding:10px; border-radius:8px; border:none;">
            <input type="number" id="nS" placeholder="sets" style="width:45%; background:#334155; color:white; padding:10px; border-radius:8px; border:none;">
            <button onclick="addEx()" style="background:var(--s); color:black; width:100%; padding:12px; font-weight:bold; margin-top:10px; border:none; border-radius:8px;">SALVAR</button>
        </div>
        <button onclick="closeM()" style="width:100%; margin-top:10px; background:transparent; color:white; border:none;">Fechar</button>
    </div></div>

    <script>
        const def = {
            'A': [{ id: 'a1', nome: "Supino Reto", kg: 40, sets: 3, img: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=400" },{ id: 'a2', nome: "Remada Baixa", kg: 25, sets: 3, img: "https://images.unsplash.com/photo-1594737625785-a6bad4b2ee8f?w=400" }],
            'B': [{ id: 'b1', nome: "Puxada Alta", kg: 50, sets: 4, img: "https://images.unsplash.com/photo-1603287611837-3204c3c63588?w=400" }],
            'C': [{ id: 'c1', nome: "Leg Press", kg: 120, sets: 4, img: "https://images.unsplash.com/photo-1574673130329-274efb4408bc?w=400" }]
        };

        let est = JSON.parse(localStorage.getItem('GF_V7')) || { treinos: def, sets: {}, dias: [], peso: [], datasP: [], inicio: new Date().toISOString().split('T')[0], lim: "" };
        let tAtivo = null; let curIdx = 0; let chart;

        function save() { localStorage.setItem('GF_V7', JSON.stringify(est)); }
        function reset() { if(confirm("Resetar?")){ localStorage.clear(); location.reload(); } }
        
        function selT(l) { 
            tAtivo = l; curIdx = 0; 
            document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active')); 
            event.currentTarget.classList.add('active'); 
            document.getElementById('cView').style.display = 'block'; 
            document.getElementById('acts').style.display = 'flex'; 
            document.getElementById('lAtivo').innerText = l; 
            render(); 
        }

        function render() { 
            const tr = document.getElementById('track'); tr.innerHTML = ''; tr.style.transform = `translateX(0px)`; 
            (est.treinos[tAtivo] || []).forEach(ex => { 
                if (!est.sets[ex.id]) est.sets[ex.id] = new Array(ex.sets).fill(false); 
                const s = est.sets[ex.id]; 
                const done = s.every(v => v === true); 
                tr.innerHTML += `<div class="card ${done ? 'done' : ''}"><img src="${ex.img}"><div style="text-align:center; padding:15px;"><h3>${ex.nome}</h3><div style="color:var(--p); font-weight:bold;">${ex.kg}kg | ${ex.sets} séries</div><div class="sets">${s.map((v, i) => `<div class="bub ${v ? 'checked' : ''}" onclick="altS('${ex.id}', ${i})">${i+1}</div>`).join('')}</div></div></div>`; 
            }); 
        }

        function altS(id, i) { est.sets[id][i] = !est.sets[id][i]; save(); render(); checkD(); }
        function move(d) { curIdx = Math.max(0, Math.min(curIdx + d, est.treinos[tAtivo].length - 1)); document.getElementById('track').style.transform = `translateX(${-curIdx * 295}px)`; }
        
        function checkD() { 
            const h = new Date().toLocaleDateString(); let ok = false; 
            for (let t in est.treinos) { if (est.treinos[t].length > 0 && est.treinos[t].every(ex => est.sets[ex.id]?.every(v => v === true))) ok = true; } 
            if (ok && !est.dias.includes(h)) est.dias.push(h); 
            else if (!ok && est.dias.includes(h)) est.dias = est.dias.filter(d => d !== h); 
            save(); upDash(); 
        }

        function upDate() { est.lim = document.getElementById('dateInp').value; save(); upDash(); }

        function upDash() {
            const hj = new Date(); hj.setHours(0,0,0,0); const ini = new Date(est.inicio + 'T00:00:00');
            if(est.lim) {
                document.getElementById('dateInp').value = est.lim;
                const fim = new Date(est.lim + 'T00:00:00');
                const tot = Math.max(1, Math.ceil((fim - ini) / 86400000) + 1);
                const fal = Math.ceil((fim - hj) / 86400000);
                document.getElementById('txtC').innerText = fal >= 0 ? `Faltam ${fal} dias` : "Meta batida!";
                const pct = Math.round((est.dias.length / tot) * 100) || 0;
                document.getElementById('cont').innerHTML = `${est.dias.length} <span style="font-size:1rem; opacity:0.6;">| ${pct}%</span>`;
                document.getElementById('bar').style.width = `${Math.min(pct, 100)}%`;
            } else { document.getElementById('cont').innerText = est.dias.length; }
        }

        function addP() {
            const p = document.getElementById('pesoInp').value;
            if(!p) return;
            est.datasP.push(new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}));
            est.peso.push(p);
            save();
            document.getElementById('pesoInp').value = '';
            chart.update();
        }

        function initChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, { type: 'line', data: { labels: est.datasP, datasets: [{ label: 'kg', data: est.peso, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } } });
        }

        function openM() { document.getElementById('mNome').innerText = tAtivo; document.getElementById('modal').style.display = 'flex'; renderE(); }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function renderE() { const d = document.getElementById('lEdicao'); d.innerHTML = ''; est.treinos[tAtivo].forEach(ex => { d.innerHTML += `<div class="item-edicao"><span>${ex.nome}</span><button onclick="remEx('${ex.id}')" style="background:var(--d); border:none; color:white; padding:5px 10px; border-radius:5px;">🗑️</button></div>`; }); }
        function addEx() { const n = document.getElementById('nN').value, p = document.getElementById('nP').value, s = document.getElementById('nS').value; if(!n || !p || !s) return; est.treinos[tAtivo].push({ id: 'ex_'+Date.now(), nome: n, kg: Number(p), sets: Number(s), img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=400" }); save(); renderE(); render(); }
        function remEx(id) { est.treinos[tAtivo] = est.treinos[tAtivo].filter(e => e.id !== id); save(); renderE(); render(); }
        
        window.onload = () => { upDash(); initChart(); };
    </script>
</body>
</html>
